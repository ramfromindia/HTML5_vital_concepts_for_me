<!DOCTYPE html>

<!--
SECURE CLIENT TEMPLATE WITH CSP NONCE ARCHITECTURE

Nonce-based CSP is used by companies like:
Google, GitHub, Stripe.

Each page request must generate a cryptographically
secure nonce on the server.

The placeholder {{CSP_NONCE}} must be replaced
by the backend.
-->

<!-- Language declaration-->
<html lang="en" class="no-js">

<head>
<!-- This Defines text encoding-->
<meta charset="UTF-8">

<!-- It defines the color scheme for the page, helps browsers render:form controls, scrollbars, built-in UI to match your theme system.-->
<meta name="color-scheme" content="light dark">

<!-- This is required for proper mobile rendering.-->
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Same-origin request:Send full URL, Cross-origin request:Send only the origin -->
 <!-- In other words, only send the origin (protocol + domain + port) in the Referer header for cross-origin requests -->
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- =========================================================
CSP NONCE POLICY
=========================================================

{{CSP_NONCE}} must be replaced server-side.

Example final header:

Content-Security-Policy:
default-src 'self';
script-src 'self' 'nonce-AbCd123SecureNonce';
style-src 'self';
img-src 'self';
connect-src 'self' https://api.adviceslip.com;
base-uri 'none';
form-action 'self';
frame-ancestors 'none';
object-src 'none';
upgrade-insecure-requests;
-->

<!-- Here we use a strict CSP that allows only our own(self) scripts and styles, and connects to a trusted API for advice. We also disable framing  -->
 <!-- In other words,Only allow resources from the same origin as the website itself.
Origin = protocol + domain + port-->
<!-- base-uri 'none' blocks malicious <base> tag injection.-->
 <!-- frame-ancestors 'none' blocks your page from being embedded in: iframe,frame,object,embed-->
<!-- upgrade-insecure-requests forces all HTTP requests to be upgraded to HTTPS. -->   
<!-- require-trusted-types-for 'script' enforces the use of Trusted Types for all script execution, by blocking dangerous sinks like; innerHTML,outerHTML and insertAdjacentHTML, preventing DOM-based XSS. --> 
<meta http-equiv="Content-Security-Policy"
content="
default-src 'none';
script-src 'self' 'nonce-{{CSP_NONCE}}';
style-src 'self';
connect-src 'self' https://api.adviceslip.com;
base-uri 'none';
form-action 'self';
frame-ancestors 'none';
upgrade-insecure-requests;
require-trusted-types-for 'script';
">

<title>Secure Mini Notes</title>

<link rel="stylesheet" href="browser_built-in_features_for_better_code.css">

</head>

<body>

<a href="#main" class="skip-link">
Skip to main content
</a>

<header>
      
<h1>My Notes</h1>

<button
id="themeToggle"
type="button"
aria-label="Toggle color theme"
aria-pressed="false"
>
<span aria-hidden="true">🌙</span>
</button>

</header>

<main id="main">

<!-- ================= CREATE NOTE ================= -->

<section class="card observe" aria-labelledby="create-note">

<form id="noteForm" novalidate>

<label id="create-note" for="noteInput" class="form-label">
Create a New Note
</label>

<!-- autocapitalize = "sentences" improves typing experience on mobile by
 capitalizing the first letter of each sentence.-->
 <!-- enterkeyhint = "send" suggests a "Send" action on the mobile keyboard, enhancing UX.-->
  <!--inputmode = "text" improves the typing experience on mobile devices by showing the appropriate keyboard for the input type.-->
<input
  type="text"
  id="noteInput"
  placeholder="Type your thoughts here..."
  required
  aria-required="true"
  minlength="3"
  maxlength="100"
  autocomplete="off"
  autocapitalize="sentences"
  enterkeyhint="send"
  spellcheck="true"
  pattern="^[A-Za-z0-9\s.,!?'-]+$"
  inputmode="text"
  title="3 to 100 characters; letters, numbers, spaces, and . , ! ? ' - only"
  aria-describedby="noteHelp"
/>

<small id="noteHelp">
Minimum 3 characters. Maximum 100.
</small>

<button type="submit" class="btn-primary">
Add Note
</button>

</form>

</section>

<!-- ================= SAVED NOTES ================= -->

<section class="card observe" aria-labelledby="saved-notes">

<div class="card-header">

<h2 id="saved-notes">Saved Notes</h2>

<!--aria-describedby="clearAllHelp" improves accessibility by providing a description for the button -->
<!-- data-confirm-state="armed" is a custom attribute used to track the confirmation state of the button.-->
<button
id="clearAllBtn"
type="button"
class="btn-danger"
aria-label="Clear all notes. Activate twice to confirm."
aria-describedby="clearAllHelp"
data-confirm-state="armed"
>
Clear All
</button>

<span id="clearAllHelp" hidden>
Action requires two clicks. Confirmation resets after 3 seconds.
</span>

</div>

<ul id="notesList" role="list"></ul>

</section>

<!-- ================= DAILY ADVICE ================= -->

<section class="card observe" aria-labelledby="daily-advice">

<h2 id="daily-advice">Daily Advice</h2>

<p id="adviceDisplay" role="status" aria-live="polite">
Gathering wisdom...
</p>

</section>

</main>

<!-- =========================================================
SAFE TEMPLATE
========================================================= -->

<template id="noteTemplate">

<li class="note-item" role="listitem">

<span class="note-text"></span>

<button
class="delete-btn"
type="button"
title="Delete Note"
aria-label="Delete this note"
>
&times;
</button>

</li>

</template>

<!-- =========================================================
NONCE PROTECTED SCRIPT
========================================================= -->

<script
nonce="{{CSP_NONCE}}"
src="browser_built-in_features_for_better_code.js"
defer>
</script>

</body>
</html>


<!-- =========================================================
SERVER IMPLEMENTATION REQUIREMENTS
========================================================= -->

<!--

SERVER MUST GENERATE NONCE PER REQUEST

Node.js example:

const nonce = crypto.randomBytes(16).toString("base64");

res.setHeader(
"Content-Security-Policy",
`default-src 'self';
script-src 'self' 'nonce-${nonce}';
style-src 'self';
img-src 'self';
connect-src 'self' https://api.adviceslip.com;
base-uri 'none';
form-action 'self';
frame-ancestors 'none';
object-src 'none';
upgrade-insecure-requests`
);

Then inject nonce into HTML template.

--------------------------------------------------

ADDITIONAL SECURITY HEADERS

Strict-Transport-Security:
max-age=63072000; includeSubDomains; preload

X-Content-Type-Options:
nosniff

Permissions-Policy:
geolocation=(), camera=(), microphone=()

Cross-Origin-Opener-Policy:
same-origin

Cross-Origin-Resource-Policy:
same-origin

Cross-Origin-Embedder-Policy:
require-corp

--------------------------------------------------

IMPORTANT

Each request must generate a NEW nonce.

Never reuse nonces across responses.

--------------------------------------------------

-->
