<!DOCTYPE html>

<!--
Security-focused client HTML

Client protections:
• Strict CSP
• Clickjacking protection
• DOM-XSS resistant structure
• Accessible semantic markup

Server security headers are documented at the bottom.
-->

<html lang="en" class="no-js">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- =========================================================
CONTENT SECURITY POLICY
=========================================================

Note:
This should be delivered via HTTP header in production.

The meta version exists for static deployments.
-->

<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self';
style-src 'self';
img-src 'self';
connect-src 'self' https://api.adviceslip.com;
base-uri 'none';
form-action 'self';
frame-ancestors 'none';
object-src 'none';
upgrade-insecure-requests;
">

<title>Secure Mini Notes</title>

<link rel="stylesheet" href="browser_built-in_features_for_better_code.css">

</head>

<body>

<a href="#main" class="skip-link">
Skip to main content
</a>

<header role="banner">

<h1>My Notes</h1>

<button
id="themeToggle"
type="button"
aria-label="Toggle color theme"
aria-controls="main"
aria-expanded="false"
>
🌙
</button>

</header>

<main id="main" role="main">

<!-- ================= CREATE NOTE ================= -->

<section class="card observe" aria-labelledby="create-note">

<form id="noteForm" novalidate>

<label id="create-note" for="noteInput" class="form-label">
Create a New Note
</label>

<!--
Input hardening (UX layer)

Server must still validate input length and encoding.
-->

<input
type="text"
id="noteInput"
placeholder="Type your thoughts here..."
required
minlength="3"
maxlength="100"
autocomplete="off"
inputmode="text"
aria-describedby="noteHelp"
>

<small id="noteHelp">
Minimum 3 characters. Maximum 100.
</small>

<button type="submit" class="btn-primary">
Add Note
</button>

</form>

</section>

<!-- ================= SAVED NOTES ================= -->

<section class="card observe" aria-labelledby="saved-notes">

<div class="card-header">

<h2 id="saved-notes">Saved Notes</h2>

<button
id="clearAllBtn"
type="button"
class="btn-danger"
aria-pressed="false"
aria-label="Clear all notes"
>
Clear All
</button>

</div>

<ul id="notesList" role="list"></ul>

</section>

<!-- ================= DAILY ADVICE ================= -->

<section class="card observe" aria-labelledby="daily-advice">

<h2 id="daily-advice">Daily Advice</h2>

<p id="adviceDisplay" role="status" aria-live="polite">
Gathering wisdom...
</p>

</section>

</main>

<!-- =========================================================
SAFE TEMPLATE

Template + textContent prevents DOM-XSS.
========================================================= -->

<template id="noteTemplate">

<li class="note-item" role="listitem">

<span class="note-text"></span>

<button
class="delete-btn"
type="button"
title="Delete Note"
aria-label="Delete this note"
>
&times;
</button>

</li>

</template>

<!-- External JS required for CSP -->
<script src="browser_built-in_features_for_better_code.js" defer></script>

</body>
</html>


<!-- =========================================================
SERVER SECURITY HEADERS (PRODUCTION)
========================================================= -->

<!--
Configure on server:

Content-Security-Policy:
default-src 'self';
script-src 'self';
style-src 'self';
img-src 'self';
connect-src 'self' https://api.adviceslip.com;
base-uri 'none';
form-action 'self';
frame-ancestors 'none';
object-src 'none';
upgrade-insecure-requests;

Strict-Transport-Security:
max-age=63072000; includeSubDomains; preload

X-Content-Type-Options:
nosniff

Permissions-Policy:
geolocation=(), camera=(), microphone=(), payment=()

Cross-Origin-Opener-Policy:
same-origin

Cross-Origin-Resource-Policy:
same-origin

Cross-Origin-Embedder-Policy:
require-corp

All form inputs must be validated server-side.
Client validation is NOT a security boundary.
-->
